<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Política de Privacidade — Intranet AOM</title>
<meta name="description" content="Política de Privacidade do sistema Intranet AOM, conforme a LGPD.">
<meta name="robots" content="index,follow">
<link rel="icon" href="/img/logo-intranet-aom.png" type="image/png">
<style>
  :root {
    --primary: #4c51bf;
    --primary-dark: #2d3a8c;
    --text: #1a202c;
    --text-soft: #4a5568;
    --muted: #718096;
    --bg: #f5f7fa;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    padding: 2.2rem 1rem 2.6rem;
    text-align: center;
  }
  .header h1 { margin: .25rem 0 .35rem; font-size: 1.6rem; font-weight: 700; }
  .header .org { font-size: .85rem; opacity: .85; text-transform: uppercase; letter-spacing: .12em; }
  .header img { height: 48px; width: auto; margin-bottom: .6rem; filter: drop-shadow(0 2px 6px rgba(0,0,0,.2)); }
  main {
    max-width: 820px;
    margin: -28px auto 2rem;
    padding: 2rem 1.5rem;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  main h2 {
    font-size: 1.15rem;
    color: var(--text);
    margin-top: 1.8rem;
    margin-bottom: .55rem;
    padding-bottom: .35rem;
    border-bottom: 1px solid var(--border);
  }
  main h2:first-child { margin-top: 0; }
  main p, main li { color: var(--text-soft); font-size: .95rem; }
  main ul { padding-left: 1.25rem; }
  main li { margin-bottom: .35rem; }
  main a { color: var(--primary); text-decoration: none; }
  main a:hover { text-decoration: underline; }
  .meta {
    margin-top: 2.2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: .8rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: .25rem;
  }
  .loading, .error {
    padding: 3rem 1rem;
    text-align: center;
    color: var(--muted);
    font-size: .95rem;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid #e2e8f0;
    border-top-color: var(--primary);
    border-radius: 50%;
    margin: 0 auto .8rem;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: .75rem;
    padding: 1rem;
  }
  @media (max-width: 600px) {
    main { margin: -20px 1rem 1rem; padding: 1.4rem 1.1rem; }
    .header { padding: 1.6rem 1rem 2rem; }
    .header h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="/img/logo-intranet-aom.png" alt="Intranet AOM" onerror="this.style.display='none'">
  <div class="org">Associação Oeste-mato-grossense</div>
  <h1>Política de Privacidade</h1>
</div>

<main id="conteudo">
  <div class="loading">
    <div class="spinner" aria-hidden="true"></div>
    Carregando política de privacidade…
  </div>
</main>

<footer>
  © Intranet AOM — <span id="anoCorrente"></span>
</footer>

<script>
(function () {
  document.getElementById('anoCorrente').textContent = new Date().getFullYear();

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function fmtData(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso.replace(' ', 'T'));
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    } catch (_) { return iso; }
  }

  fetch('/api/privacidade/obter.php', { credentials: 'omit' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      if (data.status !== 'ok') throw new Error(data.mensagem || 'Erro');
      var el = document.getElementById('conteudo');
      el.innerHTML = data.conteudo_html
        + '<div class="meta">'
        + '<span>Versão ' + escapeHtml(data.versao || '—') + '</span>'
        + '<span>Vigente desde ' + escapeHtml(fmtData(data.vigente_desde) || '—') + '</span>'
        + '</div>';
    })
    .catch(function (e) {
      document.getElementById('conteudo').innerHTML =
        '<div class="error">Não foi possível carregar a política de privacidade agora.<br>'
        + 'Tente novamente em instantes ou entre em contato com ti.misomvg@gmail.com.</div>';
      console.error('privacidade:', e);
    });
})();
</script>
</body>
</html>
